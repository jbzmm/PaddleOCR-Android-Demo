name: Android CI with NDK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Install NDK
      run: |
        # Install NDK 25.1.8937393 (required by AGP 8.1.0)
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.1.8937393" 2>/dev/null || \
        yes | $ANDROID_HOME/tools/bin/sdkmanager --install "ndk;25.1.8937393" 2>/dev/null || \
        echo "NDK may already be available"
        # Find NDK location
        NDK_DIR=$(find $ANDROID_HOME -name "ndk*" -type d 2>/dev/null | head -1)
        if [ -z "$NDK_DIR" ]; then
          echo "NDK not found, listing available..."
          ls -la $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK found"
        fi
        echo "NDK_DIR=$NDK_DIR"
        echo "NDK version: $(ls $NDK_DIR 2>/dev/null || echo 'not found')"
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        echo "ndk.dir=$ANDROID_HOME/ndk/25.1.8937393" >> local.properties
        cat local.properties
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Clean and Download Dependencies
      run: ./gradlew clean downloadAndExtractArchives --no-daemon -i
    
    - name: Build with Gradle
      run: ./gradlew assembleRelease --no-daemon -i 2>&1 | tail -100
    
    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/*.apk
